<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=428, height=926, initial-scale=1.0" name="viewport"/>
<title>安全验证 - 安全中心</title>
<!-- Material Symbols for Literal Transcription -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Design System Configuration -->
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-secondary-fixed": "#002204",
            "inverse-surface": "#2e3135",
            "tertiary": "#400003",
            "background": "#f8f9ff",
            "surface-container-lowest": "#ffffff",
            "tertiary-container": "#670008",
            "surface-variant": "#e1e2e8",
            "on-primary-fixed-variant": "#343d96",
            "surface-container-high": "#e7e8ee",
            "on-surface-variant": "#454652",
            "on-secondary-container": "#217128",
            "surface": "#f8f9ff",
            "on-tertiary-fixed-variant": "#930010",
            "on-tertiary-fixed": "#410003",
            "on-background": "#191c20",
            "primary-fixed": "#e0e0ff",
            "on-surface": "#191c20",
            "error-container": "#ffdad6",
            "surface-container-highest": "#e1e2e8",
            "secondary-container": "#a0f399",
            "on-secondary": "#ffffff",
            "on-primary-fixed": "#000767",
            "on-error-container": "#93000a",
            "on-error": "#ffffff",
            "surface-bright": "#f8f9ff",
            "primary-container": "#1a237e",
            "tertiary-fixed-dim": "#ffb3ac",
            "primary-fixed-dim": "#bdc2ff",
            "outline-variant": "#c6c5d4",
            "on-primary": "#ffffff",
            "inverse-primary": "#bdc2ff",
            "error": "#ba1a1a",
            "secondary": "#1b6d24",
            "tertiary-fixed": "#ffdad6",
            "surface-dim": "#d8dae0",
            "outline": "#767683",
            "on-primary-container": "#8690ee",
            "inverse-on-surface": "#eff0f6",
            "surface-container-low": "#f2f3f9",
            "secondary-fixed-dim": "#88d982",
            "secondary-fixed": "#a3f69c",
            "on-secondary-fixed-variant": "#005312",
            "surface-tint": "#4c56af",
            "on-tertiary": "#ffffff",
            "surface-container": "#eceef3",
            "primary": "#000666",
            "on-tertiary-container": "#ff635b"
          },
          "borderRadius": {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Montserrat", "sans-serif"],
            "body": ["Montserrat", "sans-serif"],
            "label": ["Montserrat", "sans-serif"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      width: 428px;
      height: 926px;
      margin: 0 auto;
      overflow: hidden;
      background-color: #f8f9ff;
    }
    .fingerprint-scanner {
      background: radial-gradient(circle, rgba(26, 35, 126, 0.05) 0%, rgba(248, 249, 255, 0) 70%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface flex flex-col items-center">
<!-- TopAppBar Component (from Shared JSON) -->
<header class="bg-[#F8F9FF] dark:bg-slate-950 text-[#1A237E] dark:text-indigo-400 font-['Public_Sans'] antialiased border-b border-slate-200 dark:border-slate-800 flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
<span class="text-lg font-bold text-[#1A237E] dark:text-indigo-300">安全中心</span>
</div>
<div class="flex items-center gap-2">
<button class="hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-slate-500" data-icon="help">help</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full flex flex-col items-center justify-center px-8 text-center">
<!-- Hero Branding Section -->
<div class="mb-12">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-6 mx-auto shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h1 class="text-2xl font-black text-on-background tracking-tight mb-2">安全验证</h1>
<p class="text-on-surface-variant text-base leading-relaxed font-medium">
        请将手指放在感应区以查看账单
      </p>
</div>
<!-- Interactive Fingerprint Area -->
<div class="relative w-72 h-72 flex items-center justify-center mb-16">
<!-- Decorative Pulse Rings -->
<div class="absolute inset-0 rounded-full border-2 border-primary/5 animate-pulse"></div>
<div class="absolute inset-4 rounded-full border border-primary/10"></div>
<!-- Fingerprint Container -->
<div class="fingerprint-scanner relative z-10 w-56 h-56 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-2xl shadow-indigo-100 border border-white">
<span class="material-symbols-outlined text-primary text-8xl transition-all duration-300 transform" data-icon="fingerprint" style="font-size: 110px;">fingerprint</span>
</div>
<!-- Instruction Hint -->
<div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-secondary-container px-4 py-1 rounded-full shadow-sm">
<span class="text-on-secondary-container text-xs font-bold uppercase tracking-widest">触摸传感器</span>
</div>
</div>
<!-- Asymmetric Feature Grid (Accounting Specific Context) -->
<div class="grid grid-cols-2 gap-4 w-full max-w-sm mb-12">
<div class="bg-surface-container-low p-4 rounded-lg flex flex-col items-start gap-2 border border-outline-variant/30">
<span class="material-symbols-outlined text-primary-container" data-icon="account_balance_wallet">account_balance_wallet</span>
<div class="text-left">
<p class="text-[10px] uppercase font-bold text-outline">余额</p>
<p class="text-sm font-black text-on-background">••••••</p>
</div>
</div>
<div class="bg-surface-container-low p-4 rounded-lg flex flex-col items-start gap-2 border border-outline-variant/30">
<span class="material-symbols-outlined text-secondary" data-icon="receipt_long">receipt_long</span>
<div class="text-left">
<p class="text-[10px] uppercase font-bold text-outline">账单</p>
<p class="text-sm font-black text-on-background">已锁定</p>
</div>
</div>
</div>
<!-- Secondary Actions -->
<div class="flex flex-col gap-4 w-full">
<button class="bg-primary text-white py-4 rounded-lg font-bold text-base shadow-lg shadow-primary/10 active:scale-95 transition-all">
        使用密码登录
      </button>
<button class="text-primary-container font-semibold py-2 hover:bg-indigo-50 rounded-lg transition-colors">
        取消验证
      </button>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed as per Transactional/Security Rule) -->
<!-- Accessibility & Visual Flourish: Glassmorphism Footer Hint -->
<footer class="w-full h-24 bg-white/40 backdrop-blur-md border-t border-white/20 flex flex-col items-center justify-center px-12 mt-auto">
<div class="w-32 h-1 bg-on-background/10 rounded-full mb-4"></div>
<div class="flex items-center gap-2 text-on-surface-variant/60 text-xs font-medium"><span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
      端到端加密验证
    </div>
</footer>
<!-- Background Imagery (Decorative) -->
<div class="fixed -z-10 top-0 left-0 w-full h-full opacity-40">
<div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] bg-primary-fixed-dim/30 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[5%] left-[-10%] w-[250px] h-[250px] bg-secondary-fixed/20 rounded-full blur-[60px]"></div>
</div>
</body></html>
