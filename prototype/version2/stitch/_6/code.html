<body class="bg-surface text-on-surface flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 z-50 w-[428px] bg-surface/90 backdrop-blur-md flex items-center justify-between px-6 py-3 shadow-[0_4px_20px_rgba(0,0,0,0.08)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#1A237E] text-3xl" style="">arrow_forward</span>
<h1 class="serif-text font-black text-2xl tracking-tight text-[#000666]" style="">查看明细</h1>
</div>
<button class="transition-transform active:scale-95 bg-surface-container-low rounded-full flex items-center justify-center" style="width: 48px; height: 48px;">
<span class="material-symbols-outlined text-on-surface-variant" style="">help_outline</span>
</button>
</header>
<!-- Chat Canvas -->
<main class="w-full h-full pt-[96px] pb-[160px] px-5 flex flex-col gap-6 overflow-y-auto no-scrollbar">
<!-- User Bubble -->
<div class="flex justify-end w-full animate-in slide-in-from-right duration-300">
<div class="bg-primary-container text-white p-5 rounded-t-[2rem] rounded-bl-[2rem] max-w-[85%] shadow-lg shadow-primary-container/20">
<p class="text-lg font-semibold leading-relaxed serif-text" style="">记一下，买了3箱苹果，每箱88块钱。</p>
</div>
</div>
<!-- AI Bubble -->
<div class="flex justify-start w-full animate-in slide-in-from-left duration-500">
<div class="flex flex-col gap-4 w-full">
<!-- Text Intro -->
<div class="bg-surface-container-lowest text-on-surface p-5 rounded-t-[2rem] rounded-br-[2rem] shadow-sm border-l-4 border-primary max-w-[90%]">
<p class="text-lg leading-relaxed" style="">没问题，为您准备好了入库确认单。请核对以下细节：</p>
</div>
<!-- Dynamic UI Component: Transaction Confirmation -->
<div class="bg-surface-container-lowest rounded-[2.5rem] overflow-hidden shadow-[0_16px_48px_rgba(0,6,102,0.1)] border-l-4 border-secondary p-6 flex flex-col gap-5 max-w-[95%]">
<div class="flex justify-between items-start">
<div>
<span class="text-on-surface-variant text-xs font-black tracking-[0.15em] uppercase opacity-70" style="">库存确认</span>

</div>
<div class="bg-secondary-container text-on-secondary-container px-4 py-1.5 rounded-full text-xs font-black whitespace-nowrap" style="">
                            待确认
                        </div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-5 rounded-3xl flex flex-col justify-center">
<p class="text-on-surface-variant text-[11px] uppercase font-black mb-1 opacity-70 tracking-wider" style="">数量</p>
<p class="text-2xl font-black serif-text" style="">3 箱</p>
</div>
<div class="bg-surface-container-low p-5 rounded-3xl flex flex-col justify-center">
<p class="text-on-surface-variant text-[11px] uppercase font-black mb-1 opacity-70 tracking-wider" style="">单价</p>
<p class="text-2xl font-black serif-text" style="">¥88</p>
</div>
</div>
<div class="flex items-center justify-between border-t border-dashed border-outline-variant pt-5 pb-1">
<span class="text-lg font-bold text-on-surface-variant" style="">总金额支出</span>
<span class="serif-text text-4xl font-black text-primary" style="">¥264</span>
</div>
<button class="w-full bg-secondary text-white h-[72px] rounded-[1.75rem] font-black text-xl flex items-center justify-center gap-3 active:scale-[0.97] transition-all shadow-xl shadow-secondary/30" style="">
<span class="material-symbols-outlined text-2xl" style="">check_circle</span>

                    </button>
</div>
</div>
</div>

<div class="flex justify-start w-full opacity-80">
<div class="bg-surface-container-lowest text-on-surface p-5 rounded-t-[2rem] rounded-br-[2rem] shadow-sm max-w-[85%]">
<p class="text-[17px] leading-relaxed" style="">确认后，我会自动更新库存量并同步计入本月支出账单。</p>
</div>
</div>
<div class="h-10 w-full shrink-0"></div>
</main>

<nav class="fixed bottom-0 left-0 w-[428px] bg-white border-t border-surface-container z-50 h-[120px]">
<div class="flex items-center justify-around h-full w-full px-6">
<!-- Switch to Keyboard -->
<button class="w-14 h-14 bg-surface-container-high rounded-full flex items-center justify-center text-on-surface-variant active:scale-90 transition-all" style="">
<span class="material-symbols-outlined text-3xl" style="">keyboard</span>
</button>
<!-- Main Voice Controller -->
<button class="w-[84px] h-[84px] bg-primary rounded-full shadow-[0_12px_32px_rgba(0,6,102,0.3)] flex items-center justify-center text-white active:scale-95 transition-all relative overflow-hidden" style="">
<div class="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent"></div>
<span class="material-symbols-outlined text-4xl relative z-10" style='font-variation-settings: "FILL" 1;'>mic</span>
</button>

<button class="w-14 h-14 bg-surface-container-high rounded-full flex items-center justify-center text-on-surface-variant active:scale-90 transition-all" style="">
